<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HouseAI Pro | Architecture Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5; --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f8fafc; --text-dim: #94a3b8;
            --accent: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

        body {
            background-color: var(--bg-dark); color: var(--text-main); font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, rgba(34, 211, 238, 0.1) 0, transparent 50%);
        }

        .glass { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        header {
            text-align: center; margin-bottom: 2rem; padding: 2rem 0; border-radius: 20px;
            background: linear-gradient(135deg, rgba(30,41,59,0.8) 0%, rgba(15,23,42,0.9) 100%);
            border: 1px solid rgba(255,255,255,0.05);
        }

        header h1 {
            font-size: 3.5rem; font-weight: 800; background: linear-gradient(to right, #ffffff, #22d3ee);
            -webkit-background-clip: text; color: transparent; letter-spacing: -1px;
        }

        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }
        .sidebar { padding: 2rem; height: fit-content; }
        
        .input-group { margin-bottom: 1.2rem; }
        .input-group label { display: block; font-size: 0.875rem; color: var(--text-dim); margin-bottom: 0.5rem; }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem; border-radius: 8px; color: white; font-size: 1rem; appearance: none; font-family: 'Outfit', sans-serif;
        }
        
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1.5rem; }
        .checkbox-label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-dim); cursor: pointer; }
        .checkbox-label input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }

        .btn-primary {
            width: 100%; padding: 1rem; background: var(--primary); color: white; border: none;
            border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 1rem;
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .btn-secondary {
            padding: 0.5rem 1rem; background: rgba(255, 255, 255, 0.05); color: white;
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; cursor: pointer;
        }

        .canvas-container { position: relative; padding: 1.5rem; display: flex; flex-direction: column; align-items: center; min-height: 600px; }
        #floorPlanCanvas, #threeJsContainer { width: 100%; height: 600px; border-radius: 12px; background: #fff; margin-top: 1rem; }
        #threeJsContainer { background: #0f172a; overflow: hidden; }
        .view-switcher { display: flex; gap: 1rem; margin-bottom: 1rem; }
        
        .results-card { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
        .stat-item { background: rgba(15, 23, 42, 0.3); padding: 1rem; border-radius: 8px; }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-value { font-size: 1.125rem; font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>HouseAI Pro</h1>
            <p style="color:var(--text-dim);">Advanced Generative Architecture</p>
        </header>
        
        <div class="main-grid">
            <aside class="sidebar glass">
                <h3 style="margin-bottom: 1rem;">Client Brief</h3>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label>Length (ft)</label>
                        <input type="number" id="length" value="40">
                    </div>
                    <div class="input-group">
                        <label>Width (ft)</label>
                        <input type="number" id="width" value="30">
                    </div>
                </div>

                <div class="input-group">
                    <label>Building Type</label>
                    <select id="building_type" onchange="updateDynamicFields()">
                        <option value="House">Residential House</option>
                        <option value="Apartment">Apartment Complex</option>
                        <option value="Shop">Commercial Shop</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Architectural Style</label>
                    <select id="style">
                        <option value="Modern">Modern Minimalist</option>
                        <option value="Classic">Classic Traditional</option>
                        <option value="Tech">High-Tech Smart Home</option>
                    </select>
                </div>

                <div class="input-group" id="bed_group">
                    <label>Bedrooms Wanted</label>
                    <input type="number" id="bedrooms" value="3" min="1" max="5">
                </div>

                <div class="input-group" id="unit_group" style="display: none;">
                    <label id="unit_label">Total Units</label>
                    <input type="number" id="units" value="4" min="1" max="50">
                </div>
                <label style="display: block; font-size: 0.875rem; color: var(--text-dim); margin-bottom: 0.8rem;">Premium Extras</label>
                <div class="checkbox-grid">
                    <label class="checkbox-label"><input type="checkbox" name="extras" value="Garden"> Lush Garden</label>
                    <label class="checkbox-label"><input type="checkbox" name="extras" value="Pool"> Swimming Pool</label>
                    <label class="checkbox-label"><input type="checkbox" name="extras" value="Garage"> Enclosed Garage</label>
                    <label class="checkbox-label"><input type="checkbox" name="extras" value="Vastu"> Vastu Compliant</label>
                </div>

                <div class="input-group">
                    <label>Custom Requirements (AI prompt)</label>
                    <textarea id="custom_reqs" rows="3" placeholder="e.g., I want a big backyard garden and a swimming pool..."></textarea>
                </div>
                
                <button class="btn-primary" onclick="generatePlan()">Generate Architecture Plan</button>
                
                <div id="resultsCard" class="results-card" style="display:none;">
                    <div id="aiMessage" style="margin: 1rem 0; padding: 1rem; background: rgba(99, 102, 241, 0.05); border-left: 4px solid var(--primary); border-radius: 4px; font-size: 0.9rem; line-height: 1.5;"></div>
                    <div class="stat-grid">
                        <div class="stat-item">
                            <span class="stat-label">AI Score</span>
                            <div class="stat-value" id="aiScoreTxt">--</div>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Est. Budget</span>
                            <div class="stat-value" id="budgetTxt">--</div>
                        </div>
                    </div>
                    <div style="margin-top:1.5rem;">
                        <span class="stat-label">Resource Estimation</span>
                        <div id="materialsTxt" style="font-size: 0.85rem; color: var(--text-dim); margin-top: 0.5rem; line-height: 1.6;">--</div>
                    </div>
                </div>
            </aside>

            <main class="display glass">
                <div class="canvas-container">
                    <div class="view-switcher" id="viewControls" style="display:none;">
                        <button id="btn-2d" class="btn-secondary" onclick="show2D()" style="border-bottom: 2px solid var(--primary);">CAD Blueprint (2D)</button>
                        <button id="btn-3d" class="btn-secondary" onclick="show3D()">Interactive (3D)</button>
                    </div>
                    <h2 id="layoutTitle" style="color: var(--accent);">Initialize Your Plot</h2>
                    <canvas id="floorPlanCanvas" width="600" height="600"></canvas>
                    <div id="threeJsContainer" style="display: none;"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // NEW: Dynamic UI logic to show/hide fields!
        function updateDynamicFields() {
            const bType = document.getElementById('building_type').value;
            const bedGroup = document.getElementById('bed_group');
            const unitGroup = document.getElementById('unit_group');
            const unitLabel = document.getElementById('unit_label');

            if (bType === 'House') {
                bedGroup.style.display = 'block';
                unitGroup.style.display = 'none';
            } else if (bType === 'Apartment') {
                bedGroup.style.display = 'block';
                unitGroup.style.display = 'block';
                unitLabel.innerText = 'Total Apartments';
            } else if (bType === 'Shop') {
                bedGroup.style.display = 'none'; // Hide bedrooms!
                unitGroup.style.display = 'block';
                unitLabel.innerText = 'Number of Shops';
            }
        }
        
        // Run once on load to set initial state
        window.onload = updateDynamicFields;

        let currentPlan = null;
        let lastParams = { width: 30, length: 40 };
        let scene, camera, renderer, controls;

        async function generatePlan() {
            const extraCheckboxes = document.querySelectorAll('input[name="extras"]:checked');
            const extrasArray = Array.from(extraCheckboxes).map(cb => cb.value);

            const data = {
                length: parseFloat(document.getElementById('length').value),
                width: parseFloat(document.getElementById('width').value),
                bedrooms: parseInt(document.getElementById('bedrooms').value),
                units: parseInt(document.getElementById('units').value) || 1, // NEW: Capture unit count
                building_type: document.getElementById('building_type').value,
                style: document.getElementById('style').value,
                extras: extrasArray,
                custom_reqs: document.getElementById('custom_reqs').value 
            };
            
            lastParams = { width: data.width, length: data.length };

            try {
                const response = await fetch('http://127.0.0.1:8000/get-my-plan', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) throw new Error("Server Error");
                
                const result = await response.json();
                currentPlan = result.plan;

                document.getElementById('resultsCard').style.display = 'block';
                document.getElementById('viewControls').style.display = 'flex';
                document.getElementById('layoutTitle').innerText = currentPlan.layout_type;
                document.getElementById('aiScoreTxt').innerText = `${result.score}/100`;
                document.getElementById('budgetTxt').innerText = result.budget;
                document.getElementById('aiMessage').innerText = result.ai_advice;
                
                if(result.materials) {
                    document.getElementById('materialsTxt').innerHTML = result.materials.replace(/,/g, '<br>');
                }
                
                show2D(); 
                draw2D(currentPlan.rooms, data.width, data.length);
            } catch (err) { 
                console.error(err);
                alert("Connection Failed! Make sure Uvicorn is running on port 8000."); 
            }
        }

        // ==========================================
        //         2D CAD BLUEPRINT ENGINE
        // ==========================================
        function draw2D(rooms, plotW, plotL) {
            const canvas = document.getElementById('floorPlanCanvas');
            const ctx = canvas.getContext('2d');
            const container = canvas.parentElement;
            
            canvas.width = container.offsetWidth - 48; 
            canvas.height = 600; 
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ffffff"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const hasFirstFloor = rooms.some(r => r.floor === 1);
            const availableWidth = hasFirstFloor ? canvas.width / 2 : canvas.width;
            const scale = Math.min((availableWidth - 40) / plotW, (canvas.height - 60) / plotL) * 0.9;

            function drawFloor(floorNum, offsetX) {
                const floorRooms = rooms.filter(r => (r.floor || 0) === floorNum);
                if (floorRooms.length === 0) return;
                
                const startX = offsetX + (availableWidth - plotW * scale) / 2;
                const startY = (canvas.height - plotL * scale) / 2 + 10;

                ctx.fillStyle = "#000000"; 
                ctx.font = "bold 16px Arial"; 
                ctx.textAlign = "center";
                ctx.fillText(floorNum === 0 ? "GROUND FLOOR" : "FIRST FLOOR", startX + (plotW * scale)/2, startY - 15);

                ctx.setLineDash([5, 5]); 
                ctx.strokeStyle = "#888888"; 
                ctx.strokeRect(startX, startY, plotW * scale, plotL * scale); 
                ctx.setLineDash([]);

                floorRooms.forEach(r => {
                    const rx = startX + r.x * scale;
                    const ry = startY + r.y * scale;
                    const rw = r.width * scale;
                    const rh = r.height * scale;
                    
                    ctx.fillStyle = "#ffffff"; 
                    ctx.fillRect(rx, ry, rw, rh);
                    
                    ctx.strokeStyle = "#000000"; 
                    ctx.lineWidth = r.is_open ? 1 : 4; 
                    if (r.is_open) ctx.setLineDash([5, 5]);
                    ctx.strokeRect(rx, ry, rw, rh); 
                    ctx.setLineDash([]);
                    
                    if (r.name.toLowerCase().match(/stair|parking|open|balcony|garden|pool|walkway/)) {
                        ctx.lineWidth = 0.5; 
                        ctx.beginPath();
                        ctx.moveTo(rx, ry); ctx.lineTo(rx + rw, ry + rh);
                        ctx.moveTo(rx + rw, ry); ctx.lineTo(rx, ry + rh); 
                        ctx.stroke();
                    }
                });

                floorRooms.forEach(r => {
                    if (!r.features) return;
                    r.features.forEach(f => {
                        const rx = startX + r.x * scale;
                        const ry = startY + r.y * scale;
                        const fSize = f.size * scale;
                        let cx = 0, cy = 0; 
                        
                        if (f.wall === 'top') { cx = rx + f.pos * scale; cy = ry; }
                        else if (f.wall === 'bottom') { cx = rx + f.pos * scale; cy = ry + r.height * scale; }
                        else if (f.wall === 'left') { cx = rx; cy = ry + f.pos * scale; }
                        else if (f.wall === 'right') { cx = rx + r.width * scale; cy = ry + f.pos * scale; }

                        ctx.fillStyle = "#ffffff";
                        if (f.wall === 'top' || f.wall === 'bottom') {
                            ctx.fillRect(cx - fSize/2, cy - 3, fSize, 6); 
                        } else {
                            ctx.fillRect(cx - 3, cy - fSize/2, 6, fSize);
                        }

                        ctx.strokeStyle = "#000000"; 
                        ctx.lineWidth = 1;
                        
                        if (f.type === 'window') {
                            if (f.wall === 'top' || f.wall === 'bottom') { 
                                ctx.strokeRect(cx - fSize/2, cy - 2, fSize, 4); 
                                ctx.beginPath(); ctx.moveTo(cx - fSize/2, cy); ctx.lineTo(cx + fSize/2, cy); ctx.stroke(); 
                            } else { 
                                ctx.strokeRect(cx - 2, cy - fSize/2, 4, fSize); 
                                ctx.beginPath(); ctx.moveTo(cx, cy - fSize/2); ctx.lineTo(cx, cy + fSize/2); ctx.stroke(); 
                            }
                        } 
                        else if (f.type === 'door' || f.type === 'main_door') {
                            ctx.beginPath();
                            if (f.wall === 'top' || f.wall === 'bottom') { 
                                ctx.moveTo(cx - fSize/2, cy); 
                                ctx.lineTo(cx - fSize/2, cy + (f.wall==='top'?fSize:-fSize)); 
                                ctx.arc(cx - fSize/2, cy, fSize, (f.wall==='top'?0:Math.PI), (f.wall==='top'?Math.PI/2:Math.PI*1.5), f.wall==='bottom'); 
                            } else { 
                                ctx.moveTo(cx, cy - fSize/2); 
                                ctx.lineTo(cx + (f.wall==='left'?fSize:-fSize), cy - fSize/2); 
                                ctx.arc(cx, cy - fSize/2, fSize, (f.wall==='left'?Math.PI/2:Math.PI*1.5), (f.wall==='left'?0:Math.PI), f.wall==='left'); 
                            }
                            ctx.stroke();
                        }
                        else if (f.type === 'gate' || f.type === 'shutter') {
                            ctx.setLineDash([4, 4]);
                            ctx.beginPath(); ctx.moveTo(cx - fSize/2, cy); ctx.lineTo(cx + fSize/2, cy); ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.font = `italic 10px Arial`; ctx.textAlign = "center";
                            ctx.fillText(f.type.toUpperCase(), cx, cy - 10);
                        }
                        else if (f.type === 'arch') {
                            ctx.setLineDash([2, 2]);
                            ctx.beginPath();
                            if (f.wall === 'top' || f.wall === 'bottom') { ctx.moveTo(cx - fSize/2, cy); ctx.lineTo(cx + fSize/2, cy); } 
                            else { ctx.moveTo(cx, cy - fSize/2); ctx.lineTo(cx, cy + fSize/2); }
                            ctx.stroke();
                            ctx.setLineDash([]);
                        }
                    });
                });

                floorRooms.forEach(r => {
                    const cx = startX + r.x * scale + (r.width * scale) / 2;
                    const cy = startY + r.y * scale + (r.height * scale) / 2;
                    
                    ctx.fillStyle = "#000000"; 
                    ctx.textAlign = "center"; 
                    ctx.textBaseline = "middle";
                    
                    ctx.font = `600 ${Math.max(10, scale * 0.45)}px Arial`; 
                    ctx.fillText(r.name.toUpperCase(), cx, cy - 8);
                    
                    ctx.font = `400 ${Math.max(9, scale * 0.35)}px Arial`; 
                    ctx.fillText(`${r.width.toFixed(1)}'0" X ${r.height.toFixed(1)}'0"`, cx, cy + 8);
                });
            }

            drawFloor(0, 0); 
            if (hasFirstFloor) { 
                drawFloor(1, availableWidth); 
                ctx.strokeStyle = "#dddddd"; 
                ctx.beginPath(); 
                ctx.moveTo(canvas.width/2, 20); 
                ctx.lineTo(canvas.width/2, canvas.height-20); 
                ctx.stroke(); 
            }
        }

        // ==========================================
        //         3D REALISTIC CONSTRUCTION ENGINE
        // ==========================================
        function createTileTexture() {
            const canvas = document.createElement('canvas'); 
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#b65c3e'; ctx.fillRect(0,0,128,128); 
            ctx.fillStyle = '#cf7a5c'; ctx.fillRect(0,0,64,64); ctx.fillRect(64,64,64,64);
            
            const tex = new THREE.CanvasTexture(canvas); 
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(12, 12); 
            return tex;
        }

        function init3D(rooms) {
            const container = document.getElementById('threeJsContainer');
            container.innerHTML = '';
            const w = container.offsetWidth, h = 600;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            
            camera = new THREE.PerspectiveCamera(50, w / h, 1, 2000);
            camera.position.set(-60, 70, -80); 
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(w, h); renderer.shadowMap.enabled = true; 
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sunLight = new THREE.DirectionalLight(0xffffff, 0.7);
            sunLight.position.set(-100, 200, -50); 
            sunLight.castShadow = true;
            sunLight.shadow.camera.left = -50; sunLight.shadow.camera.right = 50; 
            sunLight.shadow.camera.top = 50; sunLight.shadow.camera.bottom = -50;
            scene.add(sunLight);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.maxPolarAngle = Math.PI / 2 - 0.05;
            controls.target.set(0, 10, 0);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshPhongMaterial({ color: 0x4a5d23 }));
            ground.rotation.x = -Math.PI/2; ground.position.y = -0.5; ground.receiveShadow = true; scene.add(ground);

            const plinth = new THREE.Mesh(new THREE.BoxGeometry(lastParams.width + 1, 1.5, lastParams.length + 1), new THREE.MeshPhongMaterial({ color: 0x222222 }));
            plinth.position.set(0, 0.25, 0); plinth.receiveShadow = true; plinth.castShadow = true; scene.add(plinth);

            const tileTex = createTileTexture();
            const wallThickness = 0.6;
            const wallColor = 0x68E0E0; 
            
            const wallMat = new THREE.MeshPhongMaterial({ color: wallColor });
            const winMat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 100 });
            const doorMat = new THREE.MeshPhongMaterial({ color: 0x5C4033 });
            const roofMat = new THREE.MeshPhongMaterial({ color: 0xffffff });

            rooms.forEach(r => {
                const floorLevel = (r.floor || 0) * 12 + 1.0; 
                const isOpen = r.is_open;
                const isStairs = r.name.includes("STAIRCASE");
                const isPool = r.name.includes("POOL");
                const isGarden = r.name.includes("GARDEN");
                
                const wallH = (isOpen && !isStairs) ? 3.5 : 11; 
                const cx = r.x + r.width/2 - lastParams.width/2;
                const cz = r.y + r.height/2 - lastParams.length/2;

                let floorColor = 0xdddddd;
                if (isOpen) floorColor = tileTex;
                if (isPool) floorColor = new THREE.MeshPhongMaterial({ color: 0x00aaff });
                if (isGarden) floorColor = new THREE.MeshPhongMaterial({ color: 0x228B22 });

                const floorMat = (isPool || isGarden) ? floorColor : new THREE.MeshPhongMaterial(isOpen ? { map: tileTex } : { color: 0xdddddd });
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(r.width, r.height), floorMat);
                floor.rotation.x = -Math.PI / 2; floor.position.set(cx, floorLevel, cz); floor.receiveShadow = true; scene.add(floor);

                if (isPool || isGarden) return; 

                const buildWall = (w, h, d, px, py, pz) => {
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                    mesh.position.set(px, py, pz); mesh.castShadow = true; mesh.receiveShadow = true; scene.add(mesh);
                };

                buildWall(r.width, wallH, wallThickness, cx, floorLevel + wallH/2, cz - r.height/2); 
                if (!isStairs) buildWall(r.width, wallH, wallThickness, cx, floorLevel + wallH/2, cz + r.height/2); 
                if (!isStairs) buildWall(wallThickness, wallH, r.height, cx - r.width/2, floorLevel + wallH/2, cz); 
                buildWall(wallThickness, wallH, r.height, cx + r.width/2, floorLevel + wallH/2, cz); 

                if (!isOpen || isStairs) {
                    const roof = new THREE.Mesh(new THREE.BoxGeometry(r.width + 0.2, 0.5, r.height + 0.2), roofMat);
                    roof.position.set(cx, floorLevel + wallH + 0.25, cz); roof.castShadow = true; roof.receiveShadow = true; scene.add(roof);
                }

                if (isStairs) {
                    const landingD = 3.5; const flightW = (r.width - 0.4) / 2; const steps = 8;
                    const stepH = 12 / (steps * 2); const stepD = (r.height - landingD) / steps;

                    const landing = new THREE.Mesh(new THREE.BoxGeometry(r.width - 0.2, 0.5, landingD), new THREE.MeshPhongMaterial({color: 0x999999}));
                    landing.position.set(cx, floorLevel + 6, cz - r.height/2 + landingD/2); scene.add(landing);

                    for(let i=0; i<steps; i++) {
                        const h = stepH * (i+1);
                        const step = new THREE.Mesh(new THREE.BoxGeometry(flightW, h, stepD), new THREE.MeshPhongMaterial({color: 0xaaaaaa}));
                        step.position.set(cx + flightW/2 + 0.1, floorLevel + h/2, cz + r.height/2 - (i*stepD) - stepD/2); scene.add(step);
                    }
                    for(let j=0; j<steps; j++) {
                        const h = 6 + stepH * (j+1);
                        const step = new THREE.Mesh(new THREE.BoxGeometry(flightW, h, stepD), new THREE.MeshPhongMaterial({color: 0xaaaaaa}));
                        step.position.set(cx - flightW/2 - 0.1, floorLevel + h/2, cz - r.height/2 + landingD + (j*stepD) + stepD/2); scene.add(step);
                    }
                }

                if (r.features) {
                    r.features.forEach(f => {
                        const isHoriz = (f.wall === 'top' || f.wall === 'bottom');
                        const px = r.x + (f.wall === 'top' || f.wall === 'bottom' ? f.pos : (f.wall === 'left' ? 0 : r.width)) - lastParams.width/2;
                        const pz = r.y + (f.wall === 'left' || f.wall === 'right' ? f.pos : (f.wall === 'top' ? 0 : r.height)) - lastParams.length/2;

                        if (f.type === 'window') {
                            const winMesh = new THREE.Mesh(new THREE.BoxGeometry(isHoriz ? f.size : 1.5, 4, isHoriz ? 1.5 : f.size), winMat);
                            winMesh.position.set(px, floorLevel + 5, pz); scene.add(winMesh);
                        } else if (f.type === 'door' || f.type === 'main_door') {
                            const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(isHoriz ? f.size : 1.2, 7, isHoriz ? 1.2 : f.size), doorMat);
                            doorMesh.position.set(px, floorLevel + 3.5, pz); scene.add(doorMesh);
                        }
                    });
                }
            });

            function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
            animate();
        }

        function show2D() {
            document.getElementById('floorPlanCanvas').style.display = 'block'; document.getElementById('threeJsContainer').style.display = 'none';
            document.getElementById('btn-2d').style.borderBottom = '2px solid var(--primary)'; document.getElementById('btn-3d').style.borderBottom = 'none';
        }

        function show3D() {
            document.getElementById('floorPlanCanvas').style.display = 'none'; document.getElementById('threeJsContainer').style.display = 'block';
            document.getElementById('btn-3d').style.borderBottom = '2px solid var(--primary)'; document.getElementById('btn-2d').style.borderBottom = 'none';
            init3D(currentPlan.rooms);
        }
    </script>
</body>
</html>
